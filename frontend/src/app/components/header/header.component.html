<header class="header">
    <div class="brand" routerLink="/">
        <img src="assets/city wheels logo 2.0.png" alt="CityWheels Logo" class="brand-logo">
        <span class="brand-name">CityWheels</span>
    </div>

    <!-- Desktop Navigation -->
    <nav class="desktop-nav">
        <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">Home</a>
        <a routerLink="/cars" routerLinkActive="active">Our Cars</a>
        <a routerLink="/about-us" routerLinkActive="active">About</a>
        <a routerLink="/contactus" routerLinkActive="active">Contact</a>
        <a *ngIf="isAdmin" routerLink="/admin" routerLinkActive="active" class="admin-nav-link">
            <i class="fas fa-shield-alt"></i> Admin Panel
        </a>
    </nav>

    <div class="nav-actions">
        <!-- CTA for Desktop -->
        <button class="btn filled book-now-btn" routerLink="/cars">Book Now</button>

        <ng-container *ngIf="!isLoggedIn">
            <button class="btn outline login-btn" [routerLink]="['/login']" [queryParams]="{ returnUrl: currentUrl }">Log In</button>
        </ng-container>

        <ng-container *ngIf="isLoggedIn">
            <a class="welcome-badge" routerLink="/profile">
                <i class="fas fa-user-circle"></i> <span>Welcome, {{ userFirstName || 'User' }}!</span>
            </a>
            <button class="btn outline logout-btn" (click)="logout()">Logout</button>
        </ng-container>

        <!-- Mobile Menu (Dropdown) -->
        <div class="dropdown mobile-only">
            <button class="dropbtn menu-btn" (click)="toggleMenu()" aria-label="Menu">
                <i class="fas fa-bars"></i>
            </button>
            <div class="dropdown-content" [class.show]="isMenuOpen">
                <a routerLink="/" (click)="toggleMenu()">Home</a>
                <a routerLink="/cars" (click)="toggleMenu()">Browse Cars</a>
                <a routerLink="/about-us" (click)="toggleMenu()">About Us</a>
                <a routerLink="/contactus" (click)="toggleMenu()">Contact Us</a>

                <hr *ngIf="isLoggedIn" style="margin: 0; border: none; border-top: 1px solid #e2e8f0;">

                <a *ngIf="isAdmin" routerLink="/admin" (click)="toggleMenu()" style="color: #e53935; font-weight: bold;">
                    <i class="fas fa-shield-alt"></i> Admin Panel
                </a>

                <a *ngIf="isLoggedIn" routerLink="/profile" (click)="toggleMenu()" style="color: #0ea5e9;">
                    <i class="fas fa-user-circle"></i> My Profile
                </a>

                <hr style="margin: 0; border: none; border-top: 1px solid #e2e8f0;">

                <div class="social-header-links" style="padding: 12px 16px; display: flex; justify-content: space-around; font-size: 1.2rem;">
                    <a href="https://facebook.com" target="_blank"><i class="fa-brands fa-facebook" style="color: #1877F2;"></i></a>
                    <a href="https://www.instagram.com/1royalty_ja?igsh=ZXpsMGV1d2p0eG9v&utm_source=qr" target="_blank"><i class="fa-brands fa-instagram" style="color: #E4405F;"></i></a>
                    <a href="https://whatsapp.com/dl/" target="_blank"><i class="fa-brands fa-whatsapp" style="color: #25D366;"></i></a>
                    <a href="https://www.tiktok.com/@ruptiondeceived?_r=1&_t=ZS-94lbzyAtvGR" target="_blank"><i class="fa-brands fa-tiktok" style="color: #000;"></i></a>
                </div>
            </div>
        </div>
    </div>
</header>
