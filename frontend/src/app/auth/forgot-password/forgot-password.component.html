<div class="forgot-container">
    <div class="forgot-card">
        <div class="forgot-header">
            <img src="assets/city wheels logo 2.0.png" class="logo">
            <h2>Reset Password</h2>
            <p>Enter your email and we'll send a link to reset your password.</p>
        </div>

        <div *ngIf="isSubmitted" class="success-message">
            <i class="fas fa-check-circle"></i>
            <p>Password reset link sent! Check your inbox.</p>
        </div>

        <form (ngSubmit)="onSubmit()" *ngIf="!isSubmitted">
            <div class="form-group">
                <input type="email" placeholder="Email Address" [(ngModel)]="email" name="email" required>
                <small *ngIf="errorMessage">{{ errorMessage }}</small>
            </div>

            <button class="reset-btn" type="submit">Send Reset Link</button>
        </form>

        <p class="footer-text">
            Remembered your password?
            <a routerLink="/login">Log in</a>
        </p>
    </div>
</div>
