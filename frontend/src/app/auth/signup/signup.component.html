<div class="signup-container">
    <div class="signup-card">
        <div class="signup-header">
            <img src="assets/city wheels logo 2.0.png" class="logo">
            <h2>Create Account</h2>
        </div>

        <form [formGroup]="signupForm" (ngSubmit)="onSubmit()">

            <div class="form-group">
                <input placeholder="First Name" formControlName="firstName">
            </div>

            <div class="form-group">
                <input placeholder="Last Name" formControlName="lastName">
            </div>

            <div class="form-group">
                <input type="email" placeholder="Email Address" formControlName="email">
            </div>

            <div class="form-group">
                <input type="tel" placeholder="Phone Number" formControlName="phone">
            </div>

            <div class="form-group password-group">
                <input [type]="showPassword ? 'text' : 'password'" placeholder="Password" formControlName="password">
                <button type="button" class="toggle-password" (click)="showPassword = !showPassword" tabindex="-1">
                    <i class="fas" [ngClass]="showPassword ? 'fa-eye-slash' : 'fa-eye'"></i>
                </button>
            </div>

            <div class="form-group password-group">
                <input [type]="showConfirmPassword ? 'text' : 'password'" placeholder="Confirm Password" formControlName="confirmPassword">
                <button type="button" class="toggle-password" (click)="showConfirmPassword = !showConfirmPassword" tabindex="-1">
                    <i class="fas" [ngClass]="showConfirmPassword ? 'fa-eye-slash' : 'fa-eye'"></i>
                </button>
                <small *ngIf="submitted && f['confirmPassword']?.errors?.['mustMatch']">
                    Passwords must match
                </small>
            </div>

            <div class="form-group checkbox">
                <label>
                    <input type="checkbox" formControlName="terms">
                    I agree to the terms and conditions
                </label>
            </div>

            <p class="error" *ngIf="errorMessage">{{ errorMessage }}</p>

            <button type="submit" class="signup-btn">Create Account</button>

            <p class="footer-text">
                Already have an account?
                <a [routerLink]="['/login']" [queryParams]="{ returnUrl: returnUrl }">Login</a>
            </p>

        </form>
    </div>
</div>
